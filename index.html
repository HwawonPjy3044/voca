<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 수능 영단어 마스터 ✨ (Flash Lite)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .slide-in { animation: slideIn 0.5s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .correct-pulse { animation: pulse 0.5s ease-in-out; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .ai-tip-box { background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%); border-left: 4px solid #6366f1; }
        .clickable-overlay { cursor: pointer; }
        #api-setup-modal { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.8); }
        .error-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- API Key Setup Modal -->
    <div id="api-setup-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl space-y-6">
            <div class="text-center">
                <div class="inline-block p-3 bg-indigo-100 rounded-2xl text-indigo-600 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">API 키 설정</h2>
                <p class="text-sm text-slate-500 mt-2 leading-relaxed">Gemini API 키를 입력해 주세요.</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="api-key-input" class="w-full p-4 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none transition-all" placeholder="AIzaSy...">
                <button onclick="saveApiKey()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg">학습 시작하기</button>
            </div>
            <p class="text-[10px] text-center text-slate-400 font-medium cursor-pointer underline" onclick="window.open('https://aistudio.google.com/app/apikey')">여기서 무료 키 발급받기</p>
        </div>
    </div>

    <!-- Error Custom Modal -->
    <div id="custom-error-modal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden bg-black/60 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center space-y-4 error-shake">
            <div class="text-red-500 text-4xl">⚠️</div>
            <h3 class="text-xl font-bold text-slate-800" id="error-title">알림</h3>
            <p class="text-sm text-slate-500 leading-relaxed" id="error-description">문제가 발생했습니다.</p>
            <button onclick="closeErrorModal()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">확인</button>
        </div>
    </div>

    <div id="app-container" onclick="handleContainerClick()" class="max-w-md w-full bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col min-h-[700px] transition-all opacity-0">
        
        <div class="p-6 bg-indigo-600 text-white">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold">수능 단어 마스터 ⚡</h1>
                <div class="flex items-center gap-2">
                    <button onclick="event.stopPropagation(); resetApiKey();" class="text-[10px] bg-white/20 px-2 py-1 rounded hover:bg-white/30 transition-colors">키 변경</button>
                    <div id="voice-indicator" class="hidden text-[10px] bg-white/20 px-2 py-1 rounded animate-pulse">🔊 재생 중</div>
                    <span id="score-text" class="bg-indigo-500 px-3 py-1 rounded-full text-sm font-semibold">0개 완료</span>
                </div>
            </div>
            <div class="w-full bg-indigo-400 h-2 rounded-full overflow-hidden">
                <div id="progress-indicator" class="bg-white h-full w-full opacity-30 transition-all duration-300"></div>
            </div>
        </div>

        <div id="quiz-area" class="p-8 flex-grow flex flex-col justify-center relative">
            
            <div id="loading" class="hidden flex flex-col items-center justify-center space-y-4 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
                <div>
                    <p class="text-indigo-600 font-medium animate-pulse">새로운 단어를 찾는 중...</p>
                    <p id="loading-status" class="text-[10px] text-slate-400 mt-2 font-normal">다양한 단어를 선별하고 있습니다</p>
                </div>
            </div>

            <div id="question-container" class="space-y-6">
                <div class="text-center space-y-3">
                    <div class="flex items-center justify-center gap-3">
                        <h2 id="target-word" class="text-5xl font-extrabold text-slate-800 tracking-tight">Ready?</h2>
                    </div>
                    <p id="ai-sentence" class="text-slate-500 italic text-sm px-4 min-h-[40px] leading-relaxed"></p>
                </div>

                <div id="options" class="grid gap-3"></div>

                <div id="ai-mnemonics" class="hidden ai-tip-box p-4 rounded-2xl">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-lg">💡</span>
                        <span class="text-xs font-bold text-indigo-700 uppercase tracking-tighter">AI 암기 비법</span>
                    </div>
                    <p id="tip-text" class="text-sm text-slate-700 leading-relaxed"></p>
                </div>
            </div>

            <div id="feedback" class="hidden mt-6 p-4 rounded-2xl text-center slide-in">
                <div id="feedback-msg" class="font-bold text-lg mb-1"></div>
                <div class="text-[10px] opacity-60">클릭하면 다음 단어로 넘어갑니다</div>
            </div>
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100">
            <button id="finish-btn" onclick="event.stopPropagation(); finishGame()" class="w-full text-slate-400 hover:text-red-500 text-xs transition-colors py-2 tracking-widest">학습 결과 보기</button>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('GEMINI_API_KEY') || ""; 
        const modelName = "gemini-1.5-flash-002";

        let solvedCount = 0;
        let currentWordData = null;
        let isProcessing = false;
        let isWaitingForNext = false; 
        let incorrectWords = [];
        // 단어 중복 방지를 위한 기록 세션
        let wordHistory = []; 
        let nextTimeout = null;

        const targetWordElem = document.getElementById('target-word');
        const optionsContainer = document.getElementById('options');
        const loadingElem = document.getElementById('loading');
        const questionContainer = document.getElementById('question-container');
        const scoreText = document.getElementById('score-text');
        const feedbackElem = document.getElementById('feedback');
        const feedbackMsg = document.getElementById('feedback-msg');
        const aiSentence = document.getElementById('ai-sentence');
        const aiMnemonics = document.getElementById('ai-mnemonics');
        const tipText = document.getElementById('tip-text');
        const appContainer = document.getElementById('app-container');
        const setupModal = document.getElementById('api-setup-modal');
        const errorModal = document.getElementById('custom-error-modal');

        // 프롬프트에 중복 금지 및 랜덤성 강화 문구 추가
        const systemPrompt = "대학수능 필수 영어 단어 중에서 고등학생이 반드시 알아야 할 빈도수가 높은 핵심 단어 위주로 내줘. The response MUST be JSON with: word, choices(4 Korean), answerIndex(0-3), praise, sentence(English with ___), mnemonic(Korean).";

        function saveApiKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) {
                localStorage.setItem('GEMINI_API_KEY', val);
                apiKey = val;
                setupModal.classList.add('hidden');
                appContainer.classList.remove('opacity-0');
                fetchQuestion();
            }
        }

        function resetApiKey() {
            if (confirm("저장된 API 키를 삭제하시겠습니까?")) {
                localStorage.removeItem('GEMINI_API_KEY');
                location.reload();
            }
        }

        function showErrorModal(title, desc) {
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-description').textContent = desc;
            errorModal.classList.remove('hidden');
        }

        function closeErrorModal() { errorModal.classList.add('hidden'); }

        function handleContainerClick() {
            if (isWaitingForNext && !isProcessing) {
                clearTimeout(nextTimeout);
                fetchQuestion();
            }
        }

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    const errorData = await response.json();
                    if (response.status === 429) {
                        if (i === retries - 1) {
                            showErrorModal("한도 초과", "잠시 후 다시 시도해 주세요.");
                            throw new Error("QUOTA");
                        }
                        await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                        continue;
                    }
                    throw new Error("API ERROR");
                } catch (e) {
                    if (e.message === "QUOTA") throw e;
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, 1000 * (i + 1)));
                }
            }
        }

        async function fetchQuestion() {
            if (!apiKey || isProcessing) return;
            
            isProcessing = true; 
            isWaitingForNext = false;
            appContainer.classList.remove('clickable-overlay');
            toggleUI(true);

            // AI에게 지금까지 나온 단어들을 알려주어 중복 방지
            const historyString = wordHistory.slice(-20).join(", ");
            let promptText = `Generate a quiz for a CSAT English word. 
                             EXCLUDE these words: [${historyString}]. 
                             Pick something challenging and academic.`;

            if (incorrectWords.length > 0) {
                promptText = `Focus on this missed word: '${incorrectWords.shift()}'.`;
            }

            try {
                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 1.0 // 창의성과 다양성을 위해 온도를 높임
                        }
                    })
                });

                const result = await response.json();
                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                const data = JSON.parse(jsonText);
                
                currentWordData = data;
                wordHistory.push(data.word); // 역사에 기록
                renderQuestion(data);
            } catch (error) {
                toggleUI(false);
                targetWordElem.textContent = "오류";
                aiSentence.textContent = "연결이 불안정합니다. 다시 시도해 주세요.";
                isWaitingForNext = true; 
                appContainer.classList.add('clickable-overlay');
                isProcessing = false;
            }
        }

        function renderQuestion(data) {
            targetWordElem.textContent = data.word;
            aiSentence.textContent = data.sentence || "";
            tipText.textContent = data.mnemonic || "";
            optionsContainer.innerHTML = '';

            data.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 rounded-xl border-2 border-slate-200 text-left hover:border-indigo-500 hover:bg-indigo-50 transition-all font-medium text-slate-700 bg-white slide-in";
                btn.textContent = `${index + 1}. ${choice}`;
                btn.onclick = (e) => { e.stopPropagation(); checkAnswer(choice, btn); };
                optionsContainer.appendChild(btn);
            });
            toggleUI(false);
            isProcessing = false;
        }

        function checkAnswer(selected, button) {
            if (isProcessing) return;
            isProcessing = true; 
            isWaitingForNext = true;
            appContainer.classList.add('clickable-overlay');

            const correctChoice = currentWordData.choices[currentWordData.answerIndex];
            const allButtons = optionsContainer.querySelectorAll('button');
            allButtons.forEach(btn => btn.disabled = true);

            if (selected === correctChoice) {
                button.classList.add('border-green-500', 'bg-green-50', 'text-green-700', 'correct-pulse');
                showFeedback(currentWordData.praise || "정답입니다!", "green");
                aiMnemonics.classList.remove('hidden');
                solvedCount++;
                scoreText.textContent = `${solvedCount}개 완료 ✨`;
                nextTimeout = setTimeout(() => { if (isWaitingForNext) { isProcessing = false; fetchQuestion(); } }, 3000); 
            } else {
                button.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                showFeedback(`오답! 정답은 '${correctChoice}'`, "red");
                aiMnemonics.classList.remove('hidden');
                if (!incorrectWords.includes(currentWordData.word)) incorrectWords.push(currentWordData.word);
                nextTimeout = setTimeout(() => { if (isWaitingForNext) { isProcessing = false; fetchQuestion(); } }, 5000);
            }
            setTimeout(() => { isProcessing = false; }, 500);
        }

        function showFeedback(msg, color) {
            feedbackMsg.textContent = msg;
            feedbackElem.className = `mt-6 p-4 rounded-2xl text-center bg-${color}-100 text-${color}-700 block slide-in`;
            feedbackElem.classList.remove('hidden');
        }

        function toggleUI(isLoading) {
            if (isLoading) {
                loadingElem.classList.remove('hidden');
                questionContainer.classList.add('hidden');
                feedbackElem.classList.add('hidden');
                aiMnemonics.classList.add('hidden');
            } else {
                loadingElem.classList.add('hidden');
                questionContainer.classList.remove('hidden');
            }
        }

        function finishGame() {
            isWaitingForNext = false;
            questionContainer.innerHTML = `
                <div class="text-center space-y-6 py-10 slide-in">
                    <div class="text-6xl">📊</div>
                    <h2 class="text-3xl font-bold text-slate-800">학습 통계</h2>
                    <p class="text-slate-600">오늘 <strong>${solvedCount}</strong>개의 새로운 단어를 학습했습니다.</p>
                    <div class="text-left bg-slate-50 p-4 rounded-xl text-xs text-slate-500">
                        학습한 단어 목록: ${wordHistory.join(", ")}
                    </div>
                    <button onclick="location.reload()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700">새 세션 시작</button>
                </div>
            `;
            feedbackElem.classList.add('hidden');
        }

        window.onload = () => {
            if (!apiKey) setupModal.classList.remove('hidden');
            else {
                appContainer.classList.remove('opacity-0');
                fetchQuestion();
            }
        };
    </script>
</body>
</html>
